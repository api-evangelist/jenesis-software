  humanURL: https://www.jenesissoftware.com/integrations/
  endpointsModeled: true
  properties:
  - url: https://www.jenesissoftware.com/integrations/
    type: Documentation
  description: >-
    Modeled capability area for carrier connectivity and real-time/batch
    downloads. Jenesis integrates with IVANS and Ebix TEAM-UP for ACORD-standard
