aid: jenesis-software
url: https://raw.githubusercontent.com/api-evangelist/jenesis-software/refs/heads/main/apis.yml
name: Jenesis Software
kind: company
description: >-
  Jenesis Software is a web-based insurance agency management system (AMS) for
  independent property and casualty agencies, offering client and policy
  management, ACORD forms, carrier downloads (IVANS/Ebix), comparative rating,
  two-way email and texting, commission tracking, receipts and payments,
  e-signature, and reporting. Jenesis does NOT publish a public, self-serve
  developer API. Integration with outside systems is delivered through
  vendor-built connectors and partner platforms - Zapier (via JenesisLink),
  IVANS/Ebix ACORD carrier downloads, comparative raters (Zywave/TurboRater),
  DocuSign, QuickBooks, RingCentral, Twilio, and payment processors - each
  arranged and provisioned through Jenesis rather than exposed as documented
  REST endpoints. The API areas listed here are modeled from Jenesis's published
  product capabilities and integration surface; they do not reflect a documented
  public API and their endpoints are not published.
