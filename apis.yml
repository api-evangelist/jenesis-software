  endpointsModeled: true
  properties:
  - url: https://www.jenesissoftware.com/integrations/
    type: Documentation
  description: >-
    Modeled capability area for documents, ACORD forms, media attachments, and
    e-signature. Jenesis offers a pre-fillable ACORD form library and integrates
    with DocuSign, Formstack Sign, and WeSignature for signing. Document
