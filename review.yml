actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists, and Jenesis publishes no public API of
    any kind. No AsyncAPI document was created because there is no
    Jenesis-owned server-push transport to model. The apis.yml entry documents
    the provider honestly as an insurance AMS whose integration surface is
    partner-mediated, with the four data domains marked endpointsModeled.
